name: deploy-preflight

on:
  pull_request: {}
  push:
    branches: [main]

jobs:
  env-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject unsafe env defaults in committed env templates
        run: |
          set -e
          files="$(git ls-files '*.env*' | grep -vE '\.env\.local$' || true)"
          fail=0
          for f in $files; do
            if grep -qE '^NODE_ENV=development' "$f"; then
              echo "::error file=$f::NODE_ENV=development must not be committed"
              fail=1
            fi
            if grep -qE '^HOST=0\.0\.0\.0' "$f"; then
              echo "::error file=$f::HOST=0.0.0.0 must not be the committed default"
              fail=1
            fi
          done
          exit "$fail"

      - name: Reject `next dev` in production scripts
        run: |
          set -e
          if [ -f infrastructure/scripts/start-all.sh ]; then
            if grep -nE '(pnpm|npm|yarn).+(run +)?dev|next +dev' \
                infrastructure/scripts/start-all.sh \
                | grep -vE '^[0-9]+:\s*#'; then
              echo "::error file=infrastructure/scripts/start-all.sh::references a dev server (use start-all-dev.sh for development)"
              exit 1
            fi
          fi

      - name: Reject `HOST=0.0.0.0` as a default in apps/web scripts
        run: |
          set -e
          if grep -nE 'HOST:-0\.0\.0\.0' apps/web/package.json; then
            echo "::error file=apps/web/package.json::HOST must default to 127.0.0.1, not 0.0.0.0"
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Write CI .env
        # Use the same compose file we run locally — avoids port drift between
        # the app's env and the infra containers.
        run: cp .env.example .env

      - name: Start infra (Postgres + Redis + MinIO via docker compose)
        run: |
          docker compose -f infrastructure/docker/docker-compose.yml --env-file .env up -d
          bash infrastructure/scripts/wait-for-infra.sh

      - name: Show infra status
        if: always()
        run: |
          docker compose -f infrastructure/docker/docker-compose.yml --env-file .env ps
          docker compose -f infrastructure/docker/docker-compose.yml --env-file .env logs --tail=30

      - name: Apply migrations + seed admin
        env:
          # Seed.ts refuses a placeholder password — give it a real one.
          SEED_ADMIN_PASSWORD: ci_test_password_1234
        run: |
          # Replace the placeholder password in .env so the seed runs.
          sed -i "s|^SEED_ADMIN_PASSWORD=.*|SEED_ADMIN_PASSWORD=ci_test_password_1234|" .env
          # AUTH_SECRET placeholder too — bootstrap would normally generate one.
          node -e "console.log(require('crypto').randomBytes(48).toString('base64url'))" > .ci-secret
          sed -i "s|^AUTH_SECRET=.*|AUTH_SECRET=$(cat .ci-secret)|" .env
          rm .ci-secret
          pnpm db:migrate
          pnpm db:seed

      - name: Production build
        run: pnpm build

      - name: Vitest
        run: pnpm test

      - name: Tear down infra
        if: always()
        run: docker compose -f infrastructure/docker/docker-compose.yml --env-file .env down -v
