services:
  postgres:
    image: postgres:16-alpine
    container_name: storeai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-storeai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-storeai_dev}
      POSTGRES_DB: ${POSTGRES_DB:-storeai}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - storeai_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-storeai} -d ${POSTGRES_DB:-storeai}"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: storeai_redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - storeai_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: storeai_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-storeai}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-storeai_dev_secret}
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"
      - "${MINIO_CONSOLE_PORT:-9003}:9001"
    volumes:
      - storeai_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  storeai_pg:
  storeai_redis:
  storeai_minio:
